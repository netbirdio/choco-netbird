name: Publish Netbird to Winget

on:
  release:
    types: [published]
  push:
    branches:
    - validate-winget
  workflow_dispatch:
    inputs:
      version:
        description: 'Netbird version to publish (e.g., 0.59.8)'
        required: true
        default: '0.70.4'
        type: string

jobs:
  publish-winget:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up WingetCreate
        shell: pwsh
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.event.release.tag_name }}".TrimStart('v')
          }
          "VERSION=$version" >> $env:GITHUB_ENV
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Fetch release info & collect installer URLs
        id: release_info
        shell: pwsh
        env:
          GH_API: https://api.github.com
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          $ErrorActionPreference = 'Stop'

          $headers = @{
            Authorization          = "Bearer $env:WINGET_PAT"
            "User-Agent"           = "netbird-winget-action"
            Accept                 = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $release = Invoke-RestMethod -Headers $headers -Uri "$env:GH_API/repos/netbirdio/netbird/releases/tags/v${{ env.VERSION }}"
          } else {
            $release = Invoke-RestMethod -Headers $headers -Uri "${{ github.event.release.url }}"
          }

          # IMPORTANT: set $assets
          $assets = $release.assets
          if (-not $assets) {
            throw "Release v${{ env.VERSION }} has no assets (is the tag correct and the build finished?)."
          }

          # Collect MSI & EXE installers for x64 and arm64
          $msi_x64 = $assets | Where-Object { $_.name -like "*windows_amd64.msi" } | Select-Object -ExpandProperty browser_download_url -First 1
          $exe_x64 = $assets | Where-Object { $_.name -like "*windows_amd64.exe" } | Select-Object -ExpandProperty browser_download_url -First 1
          $msi_arm = $assets | Where-Object { $_.name -like "*windows_arm64.msi" } | Select-Object -ExpandProperty browser_download_url -First 1
          $exe_arm = $assets | Where-Object { $_.name -like "*windows_arm64.exe" } | Select-Object -ExpandProperty browser_download_url -First 1

          # At least one installer must exist
          $any = @($msi_x64, $exe_x64, $msi_arm, $exe_arm) | Where-Object { $_ }
          if (-not $any -or $any.Count -eq 0) {
            throw "No Windows installers (MSI/EXE) found in v${{ env.VERSION }}."
          }

          # Qualify with architecture to help WingetCreate match correctly
          # (WingetCreate also matches by installer type automatically)
          $qualified = @()
          if ($msi_x64) { $qualified += "$msi_x64|x64" }
          if ($exe_x64) { $qualified += "$exe_x64|x64" }
          if ($msi_arm) { $qualified += "$msi_arm|arm64" }
          if ($exe_arm) { $qualified += "$exe_arm|arm64" }

          # Persist for next step; also expose a primary for logs
          Set-Content -Path installer_urls.txt -Value ($qualified -join "`n")
          "installer_urls_file=installer_urls.txt" >> $env:GITHUB_OUTPUT
          "installer_url=$($any[0])"               >> $env:GITHUB_OUTPUT

          # (Optional) release notes, normalized to LF
          $notes = ($release.body ?? "") -replace "`r",""
          $delimNotes = "EOF_$([Guid]::NewGuid().ToString('N'))"
          Add-Content $env:GITHUB_OUTPUT "release_notes<<$delimNotes"
          Add-Content $env:GITHUB_OUTPUT $notes
          Add-Content $env:GITHUB_OUTPUT $delimNotes

      - name: Generate Winget Manifest
        shell: pwsh
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Generating Winget manifest for Netbird ${{ env.VERSION }}"
          Write-Host "Example installer: ${{ steps.release_info.outputs.installer_url }}"

          $urls = Get-Content "${{ steps.release_info.outputs.installer_urls_file }}" | Where-Object { $_.Trim() }
          if (-not $urls) { throw "No installer URLs to submit." }

          New-Item -ItemType Directory -Force -Path manifests | Out-Null

          # Pass ALL MSI+EXE installers to match the existing multi-installer manifest.
          # Output to a local directory so the manifest can be validated before submission.
          .\wingetcreate.exe update Netbird.Netbird `
            --version $env:VERSION `
            --urls $urls `
            --out manifests `
            --token $env:WINGET_PAT
          if ($LASTEXITCODE -ne 0) { throw "wingetcreate update exited with code $LASTEXITCODE" }

          $manifestDir = Get-ChildItem -Path manifests -Recurse -Directory `
            | Where-Object { Test-Path (Join-Path $_.FullName 'Netbird.Netbird.yaml') } `
            | Select-Object -First 1 -ExpandProperty FullName
          if (-not $manifestDir) { throw "Could not locate generated manifest under .\manifests" }

          Write-Host "Generated manifest at: $manifestDir"
          "manifest_dir=$manifestDir" >> $env:GITHUB_ENV

      - name: Patch AppsAndFeaturesEntries DisplayVersion
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # wingetcreate carries DisplayVersion forward from the previous manifest
          # for installers (notably nullsoft EXE) where it cannot be inferred from
          # the binary. The Microsoft Community Repo rejects PRs whose
          # AppsAndFeaturesEntries.DisplayVersion overlaps with an existing
          # indexed range, so realign it to the new PackageVersion before submit.
          $installerYaml = Join-Path $env:manifest_dir 'Netbird.Netbird.installer.yaml'
          if (-not (Test-Path $installerYaml)) { throw "Installer manifest not found at $installerYaml" }

          $content = Get-Content $installerYaml -Raw
          $patched = [regex]::Replace(
            $content,
            '(?m)^(\s*DisplayVersion:\s*).+$',
            "`${1}$env:VERSION"
          )
          Set-Content -Path $installerYaml -Value $patched -NoNewline

      - name: Validate Winget Manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Validating manifest at $env:manifest_dir"

          # PR checklist requirement: winget validate --manifest <path>
          # See https://github.com/microsoft/winget-pkgs/blob/master/doc/Authoring.md#validation
          # winget exits with a non-zero HRESULT (e.g. 0x8A150028) when validation
          # succeeds with warnings, so inspect stdout instead of the exit code alone.
          $output = (winget validate --manifest $env:manifest_dir 2>&1) | Out-String
          $exit = $LASTEXITCODE
          Write-Host $output
          if ($output -match 'Manifest validation succeeded') {
            Write-Host "winget validate accepted manifest (exit code $exit)"
          } elseif ($exit -ne 0) {
            throw "winget validate failed with exit code $exit"
          }

          # PR checklist requirement: manifest must conform to the 1.12 schema
          $versionYaml = Join-Path $env:manifest_dir 'Netbird.Netbird.yaml'
          $versionContent = Get-Content $versionYaml -Raw
          if ($versionContent -notmatch '(?m)^ManifestVersion:\s*1\.12') {
            throw "ManifestVersion must be 1.12.x to satisfy winget-pkgs schema requirement"
          }

          # PackageVersion across all manifest files must match the release tag
          $manifestFiles = Get-ChildItem -Path $env:manifest_dir -Filter '*.yaml'
          foreach ($f in $manifestFiles) {
            $c = Get-Content $f.FullName -Raw
            if ($c -notmatch "(?m)^PackageVersion:\s*$([regex]::Escape($env:VERSION))\s*$") {
              throw "PackageVersion in $($f.Name) does not match expected $env:VERSION"
            }
          }

          Write-Host "✅ Manifest validation passed for Netbird $env:VERSION"

      - name: Sandbox-test Winget Manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # PR checklist requirement: winget install --manifest <path>
          # winget-pkgs reviewers expect installers to be sandbox-tested before submission.
          # GitHub-hosted windows-latest runners do not support nested virtualization,
          # so Windows Sandbox is unavailable and we run a local source-add + install
          # smoke test instead, which exercises the same manifest the submit step uploads.
          winget source add --name netbird-local --type Microsoft.PreIndexed.Package --arg $env:manifest_dir --trust-level trusted 2>&1 | Out-Host
          try {
            winget install --manifest $env:manifest_dir --accept-package-agreements --accept-source-agreements --silent --disable-interactivity
            $installExit = $LASTEXITCODE
          } finally {
            winget source remove --name netbird-local 2>&1 | Out-Host
          }
          if ($installExit -ne 0) {
            Write-Warning "winget install --manifest exited with $installExit; submission will still proceed since dependency installation may not be available on the runner"
          } else {
            Write-Host "✅ winget install --manifest succeeded"
          }
        continue-on-error: true

